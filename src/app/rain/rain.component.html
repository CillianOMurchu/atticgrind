<div class="bg-black overflow-hidden w-full h-screen m-0 p-0">
  <nav class="rain-nav">
    <span class="rain-nav__title">RAIN</span>
    <div class="rain-nav__controls">
      <input
        class="rain-nav__text-input"
        type="text"
        [value]="displayText"
        (input)="onTextInput($event)"
        maxlength="10"
        placeholder="RAIN"
        spellcheck="false"
      >
      <select
        class="rain-nav__select"
        [value]="rainState"
        (change)="onRainStateChange($event)"
      >
        <option value="active">Active</option>
        <option value="paused">Pause</option>
        <option value="removed">Remove</option>
      </select>
    </div>
  </nav>

  <div
    class="rain-content"
    [class.rain-content--fading]="rainState === 'removed'"
    [class.rain-content--hidden]="isCanvasHidden"
  >
    <canvas #rainCanvas></canvas>
    <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.8)_100%)]"></div>
  </div>
</div>
