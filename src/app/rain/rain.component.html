<div class="bg-black overflow-hidden w-full h-screen m-0 p-0">
  <div
    class="rain-content"
    [class.rain-content--fading]="rainState === 'removed'"
    [class.rain-content--hidden]="isCanvasHidden"
  >
    <canvas #rainCanvas></canvas>
    <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.8)_100%)]"></div>
  </div>
</div>
